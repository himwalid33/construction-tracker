"none" onchange="handleSingleFileSelect(this, 'uploadDocPreview')">
                <div class="file-list" id="uploadDocPreview"></div>
            </div>
            <div class="modal-footer-custom">
                <button class="btn-custom btn-primary-custom" onclick="uploadDocument()"><i class="fas fa-cloud-upload-alt" style="margin-left: 8px;"></i>رفع</button>
                <button class="btn-custom" style="background: #e0e0e0; color: #555;" onclick="closeModal('uploadDocumentModal')">إلغاء</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== API CONFIGURATION ====================
        const API_BASE = (() => {
            const host = window.location.host;
            const protocol = window.location.protocol;
            if (host.includes('render.com') || host.includes('onrender.com') || !host.includes('localhost')) {
                return `${protocol}//${host}/api`;
            }
            return 'http://localhost:5000/api';
        })();

        let appData = {
            projects: [],
            contractors: [],
            payments: [],
            documents: [],
            settings: { retainagePercent: 5, currency: 'SAR', alertDays: 7 }
        };

        let charts = {};
        let pendingFiles = {
            project: [],
            contractor: [],
            payment: [],
            editProject: [],
            editContractor: []
        };

        // ==================== API FUNCTIONS ====================
        async function apiGet(endpoint) {
            try {
                const response = await fetch(`${API_BASE}${endpoint}`);
                if (!response.ok) throw new Error('Network error');
                return await response.json();
            } catch (error) {
                showToast('خطأ في الاتصال بالسيرفر: ' + error.message, 'error');
                return null;
            }
        }

        async function apiPost(endpoint, data) {
            try {
                const response = await fetch(`${API_BASE}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (!response.ok) throw new Error('Network error');
                return await response.json();
            } catch (error) {
                showToast('خطأ في الاتصال بالسيرفر: ' + error.message, 'error');
                return null;
            }
        }

        async function apiPut(endpoint, data) {
            try {
                const response = await fetch(`${API_BASE}${endpoint}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (!response.ok) throw new Error('Network error');
                return await response.json();
            } catch (error) {
                showToast('خطأ في الاتصال بالسيرفر: ' + error.message, 'error');
                return null;
            }
        }

        async function apiDelete(endpoint) {
            try {
                const response = await fetch(`${API_BASE}${endpoint}`, { method: 'DELETE' });
                if (!response.ok) throw new Error('Network error');
                return await response.json();
            } catch (error) {
                showToast('خطأ في الاتصال بالسيرفر: ' + error.message, 'error');
                return null;
            }
        }

        async function apiUploadFile(formData) {
            try {
                const response = await fetch(`${API_BASE}/documents/upload`, {
                    method: 'POST',
                    body: formData
                });
                if (!response.ok) throw new Error('Upload failed');
                return await response.json();
            } catch (error) {
                showToast('خطأ في رفع الملف: ' + error.message, 'error');
                return null;
            }
        }

        // ==================== FILE HANDLING ====================
        function handleFileSelect(input, listId) {
            const files = Array.from(input.files);
            const container = document.getElementById(listId);

            files.forEach(file => {
                const fileId = Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                const fileObj = { id: fileId, file: file, name: file.name, size: file.size };

                if (listId === 'projectFiles') pendingFiles.project.push(fileObj);
                else if (listId === 'contractorFiles') pendingFiles.contractor.push(fileObj);
                else if (listId === 'paymentFiles') pendingFiles.payment.push(fileObj);
                else if (listId === 'editProjectFiles') pendingFiles.editProject.push(fileObj);
                else if (listId === 'editContractorFiles') pendingFiles.editContractor.push(fileObj);

                const div = document.createElement('div');
                div.className = 'file-item';
                div.id = `file_${fileId}`;
                div.innerHTML = `
                    <div class="file-item-info">
                        <div class="file-item-icon"><i class="fas fa-file"></i></div>
                        <div>
                            <div class="file-item-name">${file.name}</div>
                            <div class="file-item-size">${formatFileSize(file.size)}</div>
                        </div>
                    </div>
                    <div class="file-item-actions">
                        <button class="file-item-btn delete" onclick="removePendingFile('${fileId}', '${listId}')"><i class="fas fa-times"></i></button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function handleSingleFileSelect(input, listId) {
            const file = input.files[0];
            if (!file) return;

            const container = document.getElementById(listId);
            container.innerHTML = '';

            const div = document.createElement('div');
            div.className = 'file-item';
            div.innerHTML = `
                <div class="file-item-info">
                    <div class="file-item-icon"><i class="fas fa-file"></i></div>
                    <div>
                        <div class="file-item-name">${file.name}</div>
                        <div class="file-item-size">${formatFileSize(file.size)}</div>
                    </div>
                </div>
            `;
            container.appendChild(div);
        }

        function removePendingFile(fileId, listId) {
            const element = document.getElementById(`file_${fileId}`);
            if (element) element.remove();

            if (listId === 'projectFiles') pendingFiles.project = pendingFiles.project.filter(f => f.id !== fileId);
            else if (listId === 'contractorFiles') pendingFiles.contractor = pendingFiles.contractor.filter(f => f.id !== fileId);
            else if (listId === 'paymentFiles') pendingFiles.payment = pendingFiles.payment.filter(f => f.id !== fileId);
            else if (listId === 'editProjectFiles') pendingFiles.editProject = pendingFiles.editProject.filter(f => f.id !== fileId);
            else if (listId === 'editContractorFiles') pendingFiles.editContractor = pendingFiles.editContractor.filter(f => f.id !== fileId);
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        async function uploadFilesForEntity(entityType, entityId, files) {
            for (const fileObj of files) {
                const formData = new FormData();
                formData.append('file', fileObj.file);
                formData.append('entity_type', entityType);
                formData.append('entity_id', entityId);
                formData.append('description', fileObj.file.name);

                await apiUploadFile(formData);
            }
        }

        function renderDocumentsList(docs, containerId) {
            const container = document.getElementById(containerId);
            if (!container) return;

            if (!docs || docs.length === 0) {
                container.innerHTML = '<p style="color: #95a5a6; font-size: 0.85rem;">لا توجد مرفقات</p>';
                return;
            }

            container.innerHTML = docs.map(doc => `
                <div class="file-item">
                    <div class="file-item-info">
                        <div class="file-item-icon"><i class="fas fa-file-${getFileIcon(doc.file_type)}"></i></div>
                        <div>
                            <div class="file-item-name">${doc.original_name}</div>
                            <div class="file-item-size">${formatFileSize(doc.file_size)} · ${formatDate(doc.uploaded_at)}</div>
                        </div>
                    </div>
                    <div class="file-item-actions">
                        <button class="file-item-btn download" onclick="downloadDocument(${doc.id})" title="تحميل"><i class="fas fa-download"></i></button>
                        <button class="file-item-btn delete" onclick="deleteDocument(${doc.id})" title="حذف"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `).join('');
        }

        function getFileIcon(type) {
            const icons = { pdf: 'pdf', png: 'image', jpg: 'image', jpeg: 'image', gif: 'image', doc: 'word', docx: 'word', xls: 'excel', xlsx: 'excel', txt: 'alt', zip: 'archive' };
            return icons[type] || 'alt';
        }

        async function downloadDocument(docId) {
            window.open(`${API_BASE}/documents/${docId}/download`, '_blank');
        }

        async function deleteDocument(docId) {
            if (!confirm('هل أنت متأكد من حذف هذا الملف؟')) return;
            const result = await apiDelete(`/documents/${docId}`);
            if (result) {
                showToast('تم حذف الملف بنجاح');
                loadAllData();
            }
        }

        async function uploadDocument() {
            const entityType = document.getElementById('uploadDocEntityType').value;
            const entityId = document.getElementById('uploadDocEntityId').value;
            const description = document.getElementById('uploadDocDescription').value;
            const fileInput = document.getElementById('uploadDocFileInput');

            if (!entityType || !entityId) {
                showToast('يرجى اختيار النوع والكيان', 'error');
                return;
            }
            if (!fileInput.files[0]) {
                showToast('يرجى اختيار ملف', 'error');
                return;
            }

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            formData.append('entity_type', entityType);
            formData.append('entity_id', entityId);
            formData.append('description', description || fileInput.files[0].name);

            const result = await apiUploadFile(formData);
            if (result) {
                showToast('تم رفع الملف بنجاح');
                closeModal('uploadDocumentModal');
                fileInput.value = '';
                document.getElementById('uploadDocPreview').innerHTML = '';
                document.getElementById('uploadDocDescription').value = '';
                loadAllData();
            }
        }

        function updateUploadDocEntitySelect() {
            const type = document.getElementById('uploadDocEntityType').value;
            const select = document.getElementById('uploadDocEntityId');
            select.innerHTML = '<option value="">اختر</option>';

            if (type === 'project') {
                appData.projects.forEach(p => {
                    select.innerHTML += `<option value="${p.id}">${p.name}</option>`;
                });
            } else if (type === 'contractor') {
                appData.contractors.forEach(c => {
                    select.innerHTML += `<option value="${c.id}">${c.name}</option>`;
                });
            } else if (type === 'payment') {
                appData.payments.forEach(pay => {
                    const project = appData.projects.find(p => p.id === pay.project_id);
                    select.innerHTML += `<option value="${pay.id}">${getPhaseName(pay.phase)} - ${project ? project.name : 'مشروع'}</option>`;
                });
            }
        }

        // ==================== UTILITY FUNCTIONS ====================
        function formatNumber(num) {
            return num ? num.toLocaleString('ar-SA') : '0';
        }

        function formatDate(dateStr) {
            if (!dateStr) return '-';
            const date = new Date(dateStr);
            return date.toLocaleDateString('ar-SA', { year: 'numeric', month: 'short', day: 'numeric' });
        }

        function getPhaseName(phase) {
            const phases = {
                'advance': 'الدفعة المقدمة', 'foundation': 'الأساسات',
                'structure': 'الهيكل الإنشائي', 'mep': 'التمديدات الكهربائية والميكانيكية',
                'finishing': 'التشطيبات', 'final': 'الاستلام النهائي',
                'retainage': 'إطلاق الاحتفاظ', 'extra': 'دفعة إضافية'
            };
            return phases[phase] || phase;
        }

        function getMethodName(method) {
            const methods = { 'transfer': 'تحويل بنكي', 'check': 'شيك', 'cash': 'نقدي', 'letter': 'خطاب ضمان' };
            return methods[method] || method;
        }

        function getStatusBadge(status) {
            const badges = {
                'active': '<span class="status-badge status-active">نشط</span>',
                'pending': '<span class="status-badge status-pending">معلق</span>',
                'completed': '<span class="status-badge status-completed">مكتمل</span>',
                'hold': '<span class="status-badge status-hold">متوقف</span>',
                'paid': '<span class="status-badge status-active">مدفوع</span>',
                'unpaid': '<span class="status-badge status-pending">غير مدفوع</span>',
                'inactive': '<span class="status-badge status-hold">غير نشط</span>'
            };
            return badges[status] || status;
        }

        function getProjectTypeName(type) {
            const types = { 'building': 'عمارة', 'warehouse': 'مستودع', 'commercial': 'تجاري', 'industrial': 'صناعي' };
            return types[type] || type;
        }

        function getProjectTypeClass(type) {
            return type === 'building' ? 'type-building' : 'type-warehouse';
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast-custom toast-${type}`;
            const icon = type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle';
            toast.innerHTML = `
                <div class="toast-icon"><i class="fas ${icon}"></i></div>
                <div class="toast-content"><h6>${type === 'success' ? 'تم بنجاح' : type === 'error' ? 'خطأ' : 'تنبيه'}</h6><p>${message}</p></div>
            `;
            container.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; toast.style.transform = 'translateX(-50px)'; setTimeout(() => toast.remove(), 300); }, 3000);
        }

        // ==================== NAVIGATION ====================
        function showSection(sectionId) {
            document.querySelectorAll('.section-content').forEach(el => el.classList.remove('active'));
            document.getElementById(sectionId).classList.add('active');
            document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
            event.target.closest('.nav-link').classList.add('active');

            const titles = {
                'dashboard': 'لوحة التحكم', 'projects': 'المشاريع',
                'payments': 'الدفعات', 'contractors': 'المقاولين',
                'reports': 'التقارير', 'documents': 'المرفقات', 'settings': 'الإعدادات'
            };
            const icons = {
                'dashboard': 'chart-line', 'projects': 'hard-hat',
                'payments': 'money-bill-wave', 'contractors': 'users',
                'reports': 'file-alt', 'documents': 'folder-open', 'settings': 'cog'
            };
            document.getElementById('pageTitle').innerHTML = `<i class="fas fa-${icons[sectionId]}" style="margin-left: 10px;"></i>${titles[sectionId]}`;

            if (sectionId === 'dashboard') loadDashboard();
            if (sectionId === 'projects') loadProjects();
            if (sectionId === 'payments') loadPayments();
            if (sectionId === 'contractors') loadContractors();
            if (sectionId === 'documents') loadDocuments();
            if (sectionId === 'reports') loadReports();
        }

        // ==================== MODALS ====================
        function openModal(modalId) {
            document.getElementById(modalId).classList.add('active');
            if (modalId === 'addProjectModal') {
                populateContractorSelect('projectContractor');
                pendingFiles.project = [];
                document.getElementById('projectFiles').innerHTML = '';
            }
            if (modalId === 'addPaymentModal') {
                populateProjectSelect('paymentProject');
                document.getElementById('paymentDate').value = new Date().toISOString().split('T')[0];
                pendingFiles.payment = [];
                document.getElementById('paymentFiles').innerHTML = '';
            }
            if (modalId === 'addContractorModal') {
                pendingFiles.contractor = [];
                document.getElementById('contractorFiles').innerHTML = '';
            }
            if (modalId === 'uploadDocumentModal') {
                document.getElementById('uploadDocEntityType').value = '';
                document.getElementById('uploadDocEntityId').innerHTML = '<option value="">اختر أولاً النوع</option>';
                document.getElementById('uploadDocDescription').value = '';
                document.getElementById('uploadDocFileInput').value = '';
                document.getElementById('uploadDocPreview').innerHTML = '';
            }
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        // ==================== DATA LOADING ====================
        async function loadAllData() {
            document.getElementById('loadingOverlay').classList.add('active');

            const [projects, contractors, payments, documents, stats] = await Promise.all([
                apiGet('/projects'),
                apiGet('/contractors'),
                apiGet('/payments'),
                apiGet('/documents'),
                apiGet('/stats')
            ]);

            if (projects) appData.projects = projects;
            if (contractors) appData.contractors = contractors;
            if (payments) appData.payments = payments;
            if (documents) appData.documents = documents;

            document.getElementById('loadingOverlay').classList.remove('active');

            if (stats) {
                document.getElementById('totalProjects').textContent = stats.total_projects;
                document.getElementById('totalBudget').textContent = formatNumber(stats.total_budget);
                document.getElementById('totalPaid').textContent = formatNumber(stats.total_paid);
                document.getElementById('totalRemaining').textContent = formatNumber(stats.total_remaining);
                document.getElementById('projectCount').textContent = stats.total_projects;
            }

            if (documents) {
                document.getElementById('documentsCount').textContent = documents.length;
            }

            loadDashboard();
        }

        // ==================== DASHBOARD ====================
        async function loadDashboard() {
            const stats = await apiGet('/stats');
            if (!stats) return;

            document.getElementById('totalProjects').textContent = stats.total_projects;
            document.getElementById('totalBudget').textContent = formatNumber(stats.total_budget);
            document.getElementById('totalPaid').textContent = formatNumber(stats.total_paid);
            document.getElementById('totalRemaining').textContent = formatNumber(stats.total_remaining);

            renderDashboardCharts();
            renderRecentPayments();
        }

        function renderDashboardCharts() {
            const ctx1 = document.getElementById('paymentsChart');
            const ctx2 = document.getElementById('budgetChart');
            if (!ctx1 || !ctx2) return;

            if (charts.payments) charts.payments.destroy();
            if (charts.budget) charts.budget.destroy();

            const projectPayments = {};
            appData.payments.forEach(p => {
                if (p.status === 'paid') projectPayments[p.project_id] = (projectPayments[p.project_id] || 0) + p.amount;
            });

            const labels = appData.projects.map(p => p.name.substring(0, 15) + '...');
            const data = appData.projects.map(p => projectPayments[p.id] || 0);
            const budgets = appData.projects.map(p => p.budget);

            charts.payments = new Chart(ctx1, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{ data: data, backgroundColor: ['#1a5276', '#2874a6', '#3498db', '#5dade2', '#85c1e9', '#aed6f1', '#d6eaf8'], borderWidth: 2, borderColor: '#fff' }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right' } } }
            });

            charts.budget = new Chart(ctx2, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'الميزانية', data: budgets, backgroundColor: 'rgba(26,82,118,0.7)', borderRadius: 8 },
                        { label: 'المدفوع', data: data, backgroundColor: 'rgba(39,174,96,0.7)', borderRadius: 8 }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: { y: { beginAtZero: true, ticks: { callback: function(value) { return formatNumber(value); } } } }
                }
            });
        }

        function renderRecentPayments() {
            const tbody = document.getElementById('recentPaymentsBody');
            const recent = [...appData.payments].sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 5);

            tbody.innerHTML = recent.map(p => {
                const project = appData.projects.find(proj => proj.id === p.project_id);
                const contractor = appData.contractors.find(c => c.id === p.contractor_id);
                return `<tr><td>${project ? project.name : '-'}</td><td>${contractor ? contractor.name : '-'}</td><td>${getPhaseName(p.phase)}</td><td style="font-weight:600;color:var(--primary-color)">${formatNumber(p.amount)}</td><td>${formatDate(p.date)}</td><td>${getStatusBadge(p.status)}</td></tr>`;
            }).join('');
        }

        // ==================== PROJECTS ====================
        async function loadProjects() {
            const projects = await apiGet('/projects');
            const contractors = await apiGet('/contractors');
            const payments = await apiGet('/payments');
            if (projects) appData.projects = projects;
            if (contractors) appData.contractors = contractors;
            if (payments) appData.payments = payments;
            renderProjects();
        }

        function renderProjects() {
            const grid = document.getElementById('projectsGrid');
            const search = document.getElementById('projectSearch').value.toLowerCase();

            let filtered = appData.projects;
            if (search) filtered = filtered.filter(p => p.name.toLowerCase().includes(search) || (p.location && p.location.toLowerCase().includes(search)));

            grid.innerHTML = filtered.map(p => {
                const contractor = appData.contractors.find(c => c.id === p.contractor_id);
                const paid = appData.payments.filter(pay => pay.project_id === p.id && pay.status === 'paid').reduce((sum, pay) => sum + pay.amount, 0);
                const progress = p.budget > 0 ? Math.round((paid / p.budget) * 100) : 0;
                const paymentsCount = appData.payments.filter(pay => pay.project_id === p.id).length;
                const docsCount = p.documents ? p.documents.length : 0;

                return `
                    <div class="project-card">
                        <span class="project-type-badge ${getProjectTypeClass(p.type)}">${getProjectTypeName(p.type)}</span>
                        <h4>${p.name}</h4>
                        <div class="contractor-name"><i class="fas fa-user-tie" style="margin-left:5px"></i>${contractor ? contractor.name : 'غير معين'}</div>
                        <div class="progress-custom" style="margin-bottom:10px">
                            <div class="progress-bar-custom" style="width:${progress}%;background:${progress>=100?'#27ae60':progress>=50?'#f39c12':'#1a5276'}"></div>
                        </div>
                        <div style="display:flex;justify-content:space-between;font-size:0.85rem;color:#7f8c8d;margin-bottom:10px">
                            <span>التقدم: ${progress}%</span><span>${formatNumber(paid)} / ${formatNumber(p.budget)} ريال</span>
                        </div>
                        <div class="project-stats">
                            <div class="project-stat"><div class="project-stat-value">${formatNumber(p.budget)}</div><div class="project-stat-label">الميزانية</div></div>
                            <div class="project-stat"><div class="project-stat-value">${paymentsCount}</div><div class="project-stat-label">الدفعات</div></div>
                            <div class="project-stat"><div class="project-stat-value">${docsCount}</div><div class="project-stat-label">المرفقات</div></div>
                        </div>
                        <div class="action-buttons">
                            <button class="action-btn btn-edit" onclick="event.stopPropagation();editProject(${p.id})"><i class="fas fa-edit"></i>تعديل</button>
                            <button class="action-btn btn-delete" onclick="event.stopPropagation();deleteProject(${p.id})"><i class="fas fa-trash"></i>حذف</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function filterProjects() { renderProjects(); }

        function filterByType(type) {
            document.querySelectorAll('.filter-chip').forEach(chip => chip.classList.remove('active'));
            event.target.classList.add('active');

            let filtered = appData.projects;
            if (type !== 'all') {
                if (type === 'active') filtered = filtered.filter(p => p.status === 'active');
                else if (type === 'completed') filtered = filtered.filter(p => p.status === 'completed');
                else filtered = filtered.filter(p => p.type === type);
            }

            const grid = document.getElementById('projectsGrid');
            grid.innerHTML = filtered.map(p => {
                const contractor = appData.contractors.find(c => c.id === p.contractor_id);
                const paid = appData.payments.filter(pay => pay.project_id === p.id && pay.status === 'paid').reduce((sum, pay) => sum + pay.amount, 0);
                const progress = p.budget > 0 ? Math.round((paid / p.budget) * 100) : 0;
                const paymentsCount = appData.payments.filter(pay => pay.project_id === p.id).length;
                const docsCount = p.documents ? p.documents.length : 0;

                return `
                    <div class="project-card">
                        <span class="project-type-badge ${getProjectTypeClass(p.type)}">${getProjectTypeName(p.type)}</span>
                        <h4>${p.name}</h4>
                        <div class="contractor-name"><i class="fas fa-user-tie" style="margin-left:5px"></i>${contractor ? contractor.name : 'غير معين'}</div>
                        <div class="progress-custom" style="margin-bottom:10px">
                            <div class="progress-bar-custom" style="width:${progress}%;background:${progress>=100?'#27ae60':progress>=50?'#f39c12':'#1a5276'}"></div>
                        </div>

            if (filter !== 'all') filtered = filtered.filter(d => d.entity_type === filter);

            container.innerHTML = filtered.map(doc => {
                let entityName = '';
                if (doc.entity_type === 'project') {
                    const p = appData.projects.find(proj => proj.id === doc.entity_id);
                    entityName = p ? p.name : 'مشروع محذوف';
                } else if (doc.entity_type === 'contractor') {
                    const c = appData.contractors.find(con => con.id === doc.entity_id);
                    entityName = c ? c.name : 'مقاول محذوف';
                } else if (doc.entity_type === 'payment') {
                    const pay = appData.payments.find(p => p.id === doc.entity_id);
                    entityName = pay ? getPhaseName(pay.phase) : 'دفعة محذوفة';
                }

                const typeLabels = { project: 'مشروع', contractor: 'مقاول', payment: 'دفعة' };

                return `
                    <div class="file-item" style="margin-bottom: 10px;">
                        <div class="file-item-info">

        function showReportTab(tabName) {
            document.querySelectorAll('.custom-tab').forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');
            document.querySelectorAll('.report-tab').forEach(tab => tab.classList.remove('active'));

            if (tabName === 'financial') updateFinancialReport();
        }

        function updateFinancialReport() {
            const totalBudget = appData.projects.reduce((sum, p) => sum + p.budget, 0);
            const totalPaid = appData.payments.filter(p => p.status === 'paid').reduce((sum, p) => sum + p.amount, 0);
            const totalRemaining = totalBudget - totalPaid;
            const progress = totalBudget > 0 ? Math.round((totalPaid / totalBudget) * 100) : 0;

            document.getElementById('reportTotalBudget').textContent = formatNumber(totalBudget) + ' ريال';
            document.getElementById('reportTotalPaid').textContent = formatNumber(totalPaid) + ' ريال';
            document.getElementById('reportTotalRemaining').textContent = formatNumber(totalRemaining) + ' ريال';
            document.getElementById('reportProgress').textContent = progress + '%';

            const ctx = document.getElementById('financialChart');
            if (!ctx) return;
            if (charts.financial) charts.financial.destroy();

            const projectData = appData.projects.map(p => {
                const paid = appData.payments.filter(pay => pay.project_id === p.id && pay.status === 'paid').reduce((sum, pay) => sum + pay.amount, 0);
                return { name: p.name.substring(0, 15), budget: p.budget, paid: paid, remaining: p.budget - paid };
            });

            charts.financial = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: projectData.map(p => p.name),
                    datasets: [
                        { label: 'الميزانية', data: projectData.map(p => p.budget), backgroundColor: 'rgba(26,82,118,0.8)', borderRadius: 8 },
                        { label: 'المدفوع', data: projectData.map(p => p.paid), backgroundColor: 'rgba(39,174,96,0.8)', borderRadius: 8 },
                        { label: 'المتبقي', data: projectData.map(p => p.remaining), backgroundColor: 'rgba(231,76,60,0.8)', borderRadius: 8 }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: { y: { beginAtZero: true, ticks: { callback: function(value) { return formatNumber(value); } } } }
                }
            });
        }

                appData.projects.forEach(p => { projectSelect.innerHTML += `<option value="${p.id}">${p.name}</option>`; });

            `;
        }

        async function loadContractorReport() {
            const contractorId = document.getElementById('reportContractorSelect').value;
            if (!contractorId) return;
            const contractor = appData.contractors.find(c => c.id === parseInt(contractorId));
            const projects = appData.projects.filter(p => p.contractor_id === parseInt(contractorId));
            const payments = appData.payments.filter(p => p.contractor_id === parseInt(contractorId));
            const totalBudget = projects.reduce((sum, p) => sum + p.budget, 0);
            const totalPaid = payments.filter(p => p.status === 'paid').reduce((sum, p) => sum + p.amount, 0);

            document.getElementById('contractorReportContent').innerHTML = `
                <div class="summary-box">
                    <h3>${contractor.name}</h3>
                    <div class="summary-item"><span class="summary-label">المشاريع</span><span class="summary-value">${projects.length}</span></div>
                    <div class="summary-item"><span class="summary-label">العقود</span><span class="summary-value">${formatNumber(totalBudget)} ريال</span></div>
                    <div class="summary-item"><span class="summary-label">المدفوع</span><span class="summary-value">${formatNumber(totalPaid)} ريال</span></div>
                    <div class="summary-item"><span class="summary-label">المتبقي</span><span class="summary-value">${formatNumber(totalBudget - totalPaid)} ريال</span></div>
                </div>
                <div class="content-card" style="margin-top:20px">
                    <div class="card-header-custom"><h5>المشاريع المرتبطة</h5></div>
                    <div class="card-body-custom">
                        <table class="custom-table">
                            <thead><tr><th>المشروع</th><th>الميزانية</th><th>المدفوع</th><th>المتبقي</th><th>الحالة</th></tr></thead>
                            <tbody>${projects.map(p => {
                                const paid = appData.payments.filter(pay => pay.project_id === p.id && pay.status === 'paid').reduce((sum, pay) => sum + pay.amount, 0);
                                return `<tr><td>${p.name}</td><td style="font-weight:600">${formatNumber(p.budget)}</td><td style="color:var(--success-color)">${formatNumber(paid)}</td><td style="color:var(--danger-color)">${formatNumber(p.budget - paid)}</td><td>${getStatusBadge(p.status)}</td></tr>`;
                            }).join('')}</tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        // ==================== SETTINGS ====================
        async function exportDatabase() {
            const data = {
                projects: appData.projects,
                contractors: appData.contractors,
                payments: appData.payments,
                documents: appData.documents,
                export_date: new Date().toISOString()
            };
            const dataStr = JSON.stringify(data, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `construction_backup_${new Date().toISOString().split('T')[0]}.json`;
            link.click();
            showToast('تم تصدير البيانات بنجاح');
        }

        async function importDatabase(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (imported.projects && imported.contractors) {
                        for (const project of imported.projects) {
                            await apiPost('/projects', project);
                        }
                        for (const contractor of imported.contractors) {
                            await apiPost('/contractors', contractor);
                        }
                        if (imported.payments) {
                            for (const payment of imported.payments) {
                                await apiPost('/payments', payment);
                            }
                        }
                        showToast('تم استيراد البيانات بنجاح');
                        loadAllData();
                    }
                } catch (err) {
                    showToast('خطأ في قراءة الملف', 'error');
                }
            };
            reader.readAsText(file);
        }

        async function clearAllData() {
            if (confirm('هل أنت متأكد من مسح جميع البيانات؟ لا يمكن التراجع!')) {
                for (const payment of appData.payments) {
                    await apiDelete(`/payments/${payment.id}`);
                }
                for (const project of appData.projects) {
                    await apiDelete(`/projects/${project.id}`);
                }
                for (const contractor of appData.contractors) {
                    await apiDelete(`/contractors/${contractor.id}`);
                }
                showToast('تم مسح جميع البيانات');
                loadAllData();
            }
        }

        async function saveSettings() {
            const data = {
                retainage_percent: parseFloat(document.getElementById('retainagePercent').value) || 5,
                currency: document.getElementById('currency').value,
                alert_days: 7
            };
            const result = await apiPut('/settings', data);
            if (result) showToast('تم حفظ الإعدادات بنجاح');
        }

        // ==================== INITIALIZATION ====================
        document.addEventListener('DOMContentLoaded', function() {
            loadAllData();

            document.querySelectorAll('.modal-overlay').forEach(modal => {
                modal.addEventListener('click', function(e) {
                    if (e.target === this) this.classList.remove('active');
                });
            });
        });
    </script>
</body>
</html>
