services:
  - type: web
    name: construction-tracker
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn server:app --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_ENV
        value: production
      - key: DB_PATH
        value: /var/www/construction/construction.db
    disk:
      name: construction-db
      mountPath: /var/www/construction
      sizeGB: 1
